services:
  ledgerguard-phoenix:
    image: arizephoenix/phoenix:latest
    container_name: ledgerguard-phoenix
    ports:
      - "16006:6006"
      - "14317:4317"
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - ledgerguard-phoenix-data:/mnt/data

volumes:
  ledgerguard-phoenix-data:
